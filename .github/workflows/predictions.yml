name: Pronostics GDC

permissions:
  contents: write

on:
  schedule:
    # Mardi 08:00 UTC (10h00 Paris) — lancement des pronostics
    - cron: "0 8 * * 2"
    # Lundi 12:00 UTC (14h00 Paris) — résultat des pronostics
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      job:
        description: "Job à lancer manuellement (évite la course start/end en parallèle)"
        type: choice
        options:
          - both
          - start
          - end
        default: both

jobs:
  start-predictions:
    if: github.event.schedule == '0 8 * * 2' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job != 'end')
    runs-on: ubuntu-latest
    env:
      CLASH_API_KEY: ${{ secrets.CLASH_API_KEY }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
      DISCORD_CHANNEL_MEMBERS_Y8JUPC9C: ${{ secrets.DISCORD_CHANNEL_MEMBERS_Y8JUPC9C }}
      DISCORD_CHANNEL_MEMBERS_LRQP20V9: ${{ secrets.DISCORD_CHANNEL_MEMBERS_LRQP20V9 }}
      DISCORD_CHANNEL_MEMBERS_QU9UQJRL: ${{ secrets.DISCORD_CHANNEL_MEMBERS_QU9UQJRL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Post pronostics
        run: npm run predictions:start

      - name: Commit predictions data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/champion-predictions.json || true
          git diff --cached --quiet || git commit -m "chore: mise à jour pronostics GDC"
          git push || true

  end-predictions:
    if: github.event.schedule == '0 12 * * 1' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job != 'start')
    runs-on: ubuntu-latest
    env:
      CLASH_API_KEY: ${{ secrets.CLASH_API_KEY }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
      DISCORD_CHANNEL_MEMBERS_Y8JUPC9C: ${{ secrets.DISCORD_CHANNEL_MEMBERS_Y8JUPC9C }}
      DISCORD_CHANNEL_MEMBERS_LRQP20V9: ${{ secrets.DISCORD_CHANNEL_MEMBERS_LRQP20V9 }}
      DISCORD_CHANNEL_MEMBERS_QU9UQJRL: ${{ secrets.DISCORD_CHANNEL_MEMBERS_QU9UQJRL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Post resultat pronostics
        run: npm run predictions:end

      - name: Commit predictions data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/champion-predictions.json data/champion-history.json || true
          git diff --cached --quiet || git commit -m "chore: mise à jour historique pronostics GDC"
          git push || true
