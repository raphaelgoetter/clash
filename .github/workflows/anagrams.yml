name: Anagram — devine la carte

permissions:
  contents: read

on:
  # Samedi, toutes les 2h de 7h à 19h UTC (7 déclenchements : 7,9,11,13,15,17,19h).
  # Le script décide à chaque déclenchement s'il poste réellement (tirage au
  # sort, probabilité croissante garantissant un post au plus tard à 19h) —
  # voir alreadyPostedThisWeek/computeWeeklySlotIndex/shouldPostThisSlot dans
  # backend/services/anagrams.js.
  schedule:
    - cron: "0 7-19/2 * * 6"
  workflow_dispatch: {}

jobs:
  post-anagram:
    runs-on: ubuntu-latest
    env:
      CLASH_API_KEY: ${{ secrets.CLASH_API_KEY }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
      DISCORD_CHANNEL_FRAME_PUBLIC: ${{ secrets.DISCORD_CHANNEL_FRAME_PUBLIC }}
      KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
      KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Post partie Anagram (salon public, si le tirage au sort le décide)
        run: npm run anagram:public
