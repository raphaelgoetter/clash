name: Pre-GDC Weekly Summary

permissions:
  contents: write

on:
  schedule:
    # Mercredi 14:00 UTC
    - cron: "0 14 * * 3"
  workflow_dispatch:

jobs:
  post-pre-gdc-summary:
    runs-on: ubuntu-latest
    env:
      CLASH_API_KEY: ${{ secrets.CLASH_API_KEY }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
      DISCORD_CHANNEL_MEMBERS_Y8JUPC9C: ${{ secrets.DISCORD_CHANNEL_MEMBERS_Y8JUPC9C }}
      DISCORD_CHANNEL_MEMBERS_LRQP20V9: ${{ secrets.DISCORD_CHANNEL_MEMBERS_LRQP20V9 }}
      DISCORD_CHANNEL_MEMBERS_QU9UQJRL: ${{ secrets.DISCORD_CHANNEL_MEMBERS_QU9UQJRL }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Post pre-GDC summary
        run: npm run pre-war-summary

      - name: Commit log anti-doublon
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pre-gdc-weekly-log.json || true
          git diff --cached --quiet || git commit -m "chore: mise à jour log pré-GDC hebdo"
          git push || true
