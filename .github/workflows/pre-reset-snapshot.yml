name: Pre-reset snapshots

# Prend une photo instantanée des données GDC 2 minutes avant le reset journalier
# de chaque clan. Les heures de reset sont lues depuis CLAN_RESET_TIMES (dateUtils.js).
# Le script dort précisément jusqu'à T−2 min puis appelle l'API en < 1 seconde.

permissions:
  contents: write

concurrency:
  group: snapshot-pre-reset
  cancel-in-progress: false

on:
  schedule:
    # 08:30 UTC, ven–lun (capture J1 jeu, J2 ven, J3 sam, J4 dim avant reset du lendemain)
    # Marche d'avance volontaire : GitHub Actions peut démarrer jusqu'à ~60 min après le cron planifié.
    # Les resets des clans sont à 09:40, 09:42 et 09:57 UTC.
    # 08:30 donne 68 min de marge avant le premier T−2 min (09:38) — compromis durée/sécurité.
    - cron: "30 8 * * 5,6,0,1"
  workflow_dispatch:

jobs:
  pre-reset-snapshot:
    runs-on: ubuntu-latest
    env:
      CLASH_API_KEY: ${{ secrets.CLASH_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Run pre-reset snapshot script
        run: node scripts/preResetSnapshot.js

      - name: Commit snapshot result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/*.json || true
          git diff --cached --quiet || git commit -m "chore: snapshot pré-reset journalier"
          # Le script dort ~45 min : origin/main a pu avancer (cron horaire, commits manuels).
          # On fetch puis merge avec -X ours pour que nos données pré-reset gagnent
          # en cas de conflit sur les JSON (le rebase échoue car les JSON divergent).
          git fetch origin main
          git merge -X ours origin/main
          git push
