name: Daily Last Seen Alert

# Lecture + écriture pour persister le log anti-doublon.
permissions:
  contents: write

on:
  schedule:
    # 11:00 heure de Paris = 10:00 UTC en hiver, 09:00 UTC en été.
    # On déclenche aux deux heures UTC et le script ne poste qu'à 11h Paris.
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  post-last-seen:
    runs-on: ubuntu-latest
    env:
      CLASH_API_KEY: ${{ secrets.CLASH_API_KEY }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_CHANNEL_MEMBERS_Y8JUPC9C: ${{ secrets.DISCORD_CHANNEL_MEMBERS_Y8JUPC9C }}
      DISCORD_CHANNEL_MEMBERS_LRQP20V9: ${{ secrets.DISCORD_CHANNEL_MEMBERS_LRQP20V9 }}
      DISCORD_CHANNEL_MEMBERS_QU9UQJRL: ${{ secrets.DISCORD_CHANNEL_MEMBERS_QU9UQJRL }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Post last seen alert
        run: node scripts/notifyLastSeen.js

      - name: Commit log anti-doublon
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last-seen-log.json || true
          git diff --cached --quiet || git commit -m "chore: mise à jour log joueurs inactifs"
          git push || true
