name: Hourly snapshots

# allow workflow to push updates to repository (snapshot and static cache)
permissions:
  contents: write

on:
  schedule:
    # Snapshot + cache refresh : toutes les 60 minutes
    - cron: '0 * * * *'
  workflow_dispatch:            # permet un déclenchement manuel

jobs:
  take-snapshots:
    runs-on: ubuntu-latest
    # provide Clash API key from repository secrets so the script can fetch logs
    env:
      CLASH_API_KEY: ${{ secrets.CLASH_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # pour pouvoir pousser plus tard

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'        # ou la version de votre projet

      - name: Install deps
        run: npm ci

      # debug: ensure the key is being injected
      - name: Debug CLASH_API_KEY
        run: |
          echo ">>> env export contains:"
          env | grep CLASH_API_KEY || true
          echo ">>> explicit check: single-quoted value:'$CLASH_API_KEY'"
          len=$(echo -n "$CLASH_API_KEY" | wc -c)
          echo ">>> length=$len"  # masked in logs

      - name: Run snapshot script
        run: npm run snapshot

      - name: Build static clan cache
        run: npm run cache

      - name: Commit snapshot result and static cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/*.json frontend/public/clan-cache/*.json || true
          git commit --allow-empty -m "chore: update hourly snapshots & clan cache"
          git push