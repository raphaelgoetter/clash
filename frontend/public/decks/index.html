<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustRoyale - Top decks compétitifs</title>
    <meta
      name="description"
      content="Top decks compétitifs Clash Royale par région, agrégés depuis les meilleurs clans GDC. Analysez et générez des groupes de decks adaptés GDC."
    />
    <link rel="canonical" href="https://trustroyale.vercel.app/decks" />
    <meta property="og:title" content="TrustRoyale - Top decks compétitifs" />
    <meta
      property="og:description"
      content="Top decks compétitifs Clash Royale par région, agrégés depuis les meilleurs clans GDC. Analysez et générez des groupes de decks adaptés GDC."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trustroyale.vercel.app/decks" />
    <meta
      property="og:image"
      content="https://trustroyale.vercel.app/favicon.svg"
    />
    <meta property="og:site_name" content="TrustRoyale" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TrustRoyale - Top decks compétitifs" />
    <meta
      name="twitter:description"
      content="Top decks compétitifs Clash Royale par région, agrégés depuis les meilleurs clans GDC. Analysez et générez des groupes de decks adaptés GDC."
    />
    <meta
      name="twitter:image"
      content="https://trustroyale.vercel.app/favicon.svg"
    />
    <meta name="theme-color" content="#16213D" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/decks/decks.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <a class="brand" href="/">
          <img src="/favicon.svg" alt="Logo TrustRoyale" />
          <span>TrustRoyale</span>
        </a>
        <h1>Top decks</h1>
        <p>Top decks compétitifs par région.</p>
      </header>

      <section class="panel">
        <div class="deck-controls">
          <label class="deck-field">
            <span>Région</span>
            <select id="top-location-select">
              <option value="Europe" selected>Europe</option>
              <option value="France">France</option>
              <option value="USA">USA</option>
            </select>
          </label>
          <label class="deck-field">
            <span>Trier par</span>
            <select id="top-sort-select">
              <option value="usage" selected>Usage</option>
              <option value="winrate">Winrate</option>
            </select>
          </label>
          <div class="deck-actions">
            <button id="load-top-decks-btn" class="btn btn-primary">
              Charger top decks
            </button>
          </div>
        </div>
      </section>

      <div id="status" class="status"></div>
      <div id="top-decks-loader" class="loader hidden">
        <div class="loader-bar">
          <div id="top-decks-loader-fill" class="loader-fill"></div>
        </div>
        <div id="top-decks-loader-label" class="loader-label">
          Chargement des top decks…
        </div>
      </div>

      <section id="top-decks-section" class="panel hidden">
        <div class="panel-head">
          <h2>Top decks</h2>
          <button id="show-gdc-adapted-btn" class="btn btn-secondary hidden">
            Decks adaptés GDC
          </button>
        </div>
        <div id="top-decks-container"></div>
      </section>
    </main>
    <script type="module" src="/decks/decks.js"></script>
  </body>
</html>
